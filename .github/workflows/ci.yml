name: nasim-ci

on:
  push:
    branches: [ 'feature/*', develop, main, master ]
  pull_request:
    branches: [ develop, main, master ]
  workflow_dispatch:

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.9", "3.12" ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + test deps
        run: pip install -e ".[test]"
      - name: Run pytest (no network; includes the gating clean-toggle safety tests)
        run: python -m pytest test/ -q

  shim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: bin/nasim runs from checkout (no install)
        run: |
          bash -n bin/nasim
          ./bin/nasim version
          ./bin/nasim help >/dev/null

  dry-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        access: [ ssh-tunnel, tailscale, litellm ]
        agent: [ claude, aider, opencode, terminal ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Dry-run launch (no network; asserts env/exec line is produced)
        env:
          NASIM_DRY_RUN: "1"
        run: |
          out=$(./bin/nasim launch --access "${{ matrix.access }}" --agent "${{ matrix.agent }}" --model deepseek-r1:14b 2>&1)
          echo "$out"
          echo "$out" | grep -Eq 'DRY:|launching|dropping' || { echo "no launch line produced"; exit 1; }

  status:
    runs-on: ubuntu-latest
    needs: [ unit, shim, dry-matrix ]
    if: always()
    steps:
      - run: echo "nasim Python CI complete (unit + shim + dry-run access×agent matrix)."
