# yaml-language-server: $schema=https://raw.githubusercontent.com/bitol-io/open-data-contract-standard/main/schema/odcs-json-schema-latest.json
version: "1.0.0"
apiVersion: "v3.1.0"
kind: DataContract
id: urn:datacontract:nasim:session-store-legacy
name: "nasim Session Store (legacy representation)"
status: draft
domain: "nasim"
tags:
  - session
  - persistence
  - json-lines
description:
  purpose: >-
    Legacy representation of the nasim session store data contract.
    Superseded by nasim_session_store.datacontract.yaml.
    Retained for backward compatibility and migration reference.
  usage: >-
    Session persistence for agent conversations. JSON Lines format
    with one directory per session containing a single session.jsonl file.
  limitations: >-
    JSON Lines format, no relational constraints, no query engine.
    Superseded by the canonical nasim_session_store.datacontract.yaml.

servers:
  - server: session_store
    id: session_store
    type: local
    description: "Session directory per session ID with session.jsonl file"
    path: "~/.nasim/sessions/{session_id}/session.jsonl"
    format: jsonl

schema:
  - id: session
    name: Session
    logicalType: object
    description: "Agent conversation session"
    properties:
      - name: id
        logicalType: string
        required: true
        description: "Session UUID (primary key). Unique across all sessions."
      - name: created_at
        logicalType: timestamp
        required: true
        description: "Creation timestamp (ISO 8601)"
      - name: model
        logicalType: string
        required: true
        description: "LLM model name"
      - name: provider
        logicalType: string
        required: false
        description: "LLM provider name"
      - name: config_snapshot
        logicalType: string
        required: false
        description: "Config snapshot at session creation (JSON)"
      - name: message_count
        logicalType: integer
        required: false
        description: "Number of messages in session"
      - name: total_tokens
        logicalType: integer
        required: false
        description: "Total token count across all messages"

  - id: message
    name: Message
    logicalType: object
    description: "Message within a session"
    properties:
      - name: session_id
        logicalType: string
        required: true
        description: "Parent session UUID (foreign key)"
      - name: sequence
        logicalType: integer
        required: true
        description: "Message sequence number (ordering)"
      - name: role
        logicalType: string
        required: true
        description: "Message role. Allowed values: system | user | assistant | tool"
        constraints:
          enum:
            - system
            - user
            - assistant
            - tool
      - name: content
        logicalType: string
        required: false
        description: "Message content"
      - name: tool_calls
        logicalType: string
        required: false
        description: "Tool calls JSON (for assistant messages)"
      - name: tool_call_id
        logicalType: string
        required: false
        description: "Tool call ID (for tool responses)"
      - name: tokens
        logicalType: integer
        required: false
        description: "Token count for this message"
      - name: timestamp
        logicalType: timestamp
        required: false
        description: "Message timestamp (ISO 8601)"

customProperties:
  - id: governance
    property: governance
    value:
      write_authority: "SessionStore component only"
      uniqueness:
        - "session.id is unique across all sessions"
      timestamp_format: "ISO 8601: YYYY-MM-DDTHH:MM:SSZ"
      superseded_by: "nasim_session_store.datacontract.yaml — canonical contract for this store boundary"

contractCreatedTs: "2026-06-20T00:00:00Z"
