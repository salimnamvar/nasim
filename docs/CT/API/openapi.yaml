openapi: 3.1.0
info:
  title: nasim Agent API
  description: |
    ROD-compliant HTTP API for nasim code agent.
    Follows Google AIP standards for resource-oriented design.
  version: 1.0.0
  contact:
    name: Salim Namvar
    email: salim.namvar@gmail.com

servers:
  - url: http://localhost:8000
    description: Local development server

paths:
  /v1/sessions:
    get:
      operationId: listSessions
      summary: "[SESSION-03] LIST Sessions"
      description: Returns a paginated list of agent sessions.
      tags: [Sessions]
      parameters:
        - $ref: '#/components/parameters/pageSize'
        - $ref: '#/components/parameters/pageToken'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListSessionsResponse'
    post:
      operationId: createSession
      summary: "[SESSION-01] INSERT Session"
      description: Creates a new agent session.
      tags: [Sessions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionCreate'
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/sessions/{session}:
    parameters:
      - $ref: '#/components/parameters/sessionId'
    get:
      operationId: getSession
      summary: "[SESSION-02] READ Session"
      description: Returns the specified session.
      tags: [Sessions]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateSession
      summary: "[SESSION-04] UPDATE Session"
      description: Updates the specified session.
      tags: [Sessions]
      parameters:
        - $ref: '#/components/parameters/updateMask'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionUpdate'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '404':
          $ref: '#/components/responses/NotFound'
        '400':
          $ref: '#/components/responses/BadRequest'
    delete:
      operationId: deleteSession
      summary: "[SESSION-09] DELETE Session"
      description: Deletes the specified session.
      tags: [Sessions]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/sessions/{session}:dispatch:
    parameters:
      - $ref: '#/components/parameters/sessionId'
    post:
      operationId: sendMessage
      summary: "[AGENT-01] PROCESS User Task"
      description: |
        Custom method (AIP-136) for submitting a user message and receiving
        an agent response as an SSE stream of AgentEvents.
      tags: [Sessions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageCreate'
      responses:
        '200':
          description: SSE stream of AgentEvents
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/AgentEvent'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/sessions/{session}/messages:
    parameters:
      - $ref: '#/components/parameters/sessionId'
    get:
      operationId: listMessages
      summary: "[API-07] LIST Messages"
      description: Returns a paginated list of messages in the session.
      tags: [Messages]
      parameters:
        - $ref: '#/components/parameters/pageSize'
        - $ref: '#/components/parameters/pageToken'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMessagesResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/tools:
    get:
      operationId: listTools
      summary: "[TOOL-14] LIST Tools"
      description: Returns a list of registered tools.
      tags: [Tools]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListToolsResponse'

  /v1/tools/{tool}:
    parameters:
      - name: tool
        in: path
        required: true
        schema:
          type: string
        description: Tool name
    get:
      operationId: getTool
      summary: "[TOOL-14] READ Tool"
      description: Returns the specified tool.
      tags: [Tools]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tool'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/config:
    get:
      operationId: getConfig
      summary: "[CONFIG-01] READ Config"
      description: Returns the agent configuration.
      tags: [Config]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Config'
    patch:
      operationId: updateConfig
      summary: "[CONFIG-02] UPDATE Config"
      description: Updates the agent configuration.
      tags: [Config]
      parameters:
        - $ref: '#/components/parameters/updateMask'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfigUpdate'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Config'
        '400':
          $ref: '#/components/responses/BadRequest'

  /v1/sessions/{session}/subagents:
    parameters:
      - $ref: '#/components/parameters/sessionId'
    get:
      operationId: listSubagents
      summary: "[AGENT-09] LIST Subagents"
      description: Returns a list of child agents spawned in the session.
      tags: [Subagents]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListSubagentsResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      operationId: spawnSubagent
      summary: "[AGENT-09] SPAWN Subagent"
      description: Spawns a child agent for a subtask.
      tags: [Subagents]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubagentSpawn'
      responses:
        '201':
          description: Subagent spawned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subagent'
        '400':
          $ref: '#/components/responses/BadRequest'

  /v1/sessions/{session}/subagents/{subagent}:
    parameters:
      - $ref: '#/components/parameters/sessionId'
      - name: subagent
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Subagent UUID
    get:
      operationId: getSubagent
      summary: "[AGENT-10] READ Subagent"
      description: Returns the subagent's result.
      tags: [Subagents]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubagentResult'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/memory:
    get:
      operationId: recallKnowledge
      summary: "[MEMORY-02] LIST Memory"
      description: Retrieves knowledge entries.
      tags: [Memory]
      parameters:
        - $ref: '#/components/parameters/pageSize'
        - $ref: '#/components/parameters/pageToken'
        - name: scope
          in: query
          schema:
            type: string
            enum: [global, project, session]
          description: Memory scope filter
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMemoryResponse'
    post:
      operationId: persistKnowledge
      summary: "[MEMORY-01] INSERT Memory"
      description: Stores a new knowledge entry.
      tags: [Memory]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemoryEntry'
      responses:
        '201':
          description: Memory entry created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryEntry'
        '400':
          $ref: '#/components/responses/BadRequest'

  /v1/memory/search:
    get:
      operationId: searchKnowledge
      summary: "[MEMORY-03] SEARCH Memory"
      description: Searches knowledge entries using full-text search.
      tags: [Memory]
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
          description: Search query
        - name: scope
          in: query
          schema:
            type: string
            enum: [global, project, session]
          description: Search scope
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchMemoryResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /v1/sessions/{session}/snapshots:
    parameters:
      - $ref: '#/components/parameters/sessionId'
    get:
      operationId: listSnapshots
      summary: "[SESSION-05] LIST Snapshots"
      description: Lists session snapshots.
      tags: [Snapshots]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListSnapshotsResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      operationId: createSnapshot
      summary: "[SESSION-05] INSERT Snapshot"
      description: Creates a session snapshot.
      tags: [Snapshots]
      responses:
        '201':
          description: Snapshot created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Snapshot'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/sessions/{session}/snapshots/{snapshot}:restore:
    parameters:
      - $ref: '#/components/parameters/sessionId'
      - name: snapshot
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Snapshot UUID
    post:
      operationId: restoreSnapshot
      summary: "[SESSION-06] RESTORE Snapshot"
      description: Restores a session from a snapshot.
      tags: [Snapshots]
      responses:
        '200':
          description: Session restored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/sessions/{session}/todos:
    parameters:
      - $ref: '#/components/parameters/sessionId'
    get:
      operationId: listTodos
      summary: "[TOOL-18] LIST Todos"
      description: Lists todo items in the session.
      tags: [Todos]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListTodosResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      operationId: createTodo
      summary: "[TOOL-16] INSERT Todo"
      description: Creates a todo item.
      tags: [Todos]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TodoCreate'
      responses:
        '201':
          description: Todo created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Todo'
        '400':
          $ref: '#/components/responses/BadRequest'

  /v1/sessions/{session}/todos/{todo}:
    parameters:
      - $ref: '#/components/parameters/sessionId'
      - name: todo
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Todo UUID
    patch:
      operationId: updateTodo
      summary: "[TOOL-17] UPDATE Todo"
      description: Updates a todo item.
      tags: [Todos]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TodoUpdate'
      responses:
        '200':
          description: Todo updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Todo'
        '404':
          $ref: '#/components/responses/NotFound'
        '400':
          $ref: '#/components/responses/BadRequest'

components:
  parameters:
    sessionId:
      name: session
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Session UUID
    pageSize:
      name: page_size
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
      description: Maximum number of items to return
    pageToken:
      name: page_token
      in: query
      schema:
        type: string
      description: Opaque cursor from previous response
    updateMask:
      name: update_mask
      in: query
      schema:
        type: string
      description: Comma-separated list of fields to update

  schemas:
    Session:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: Session UUID (OUTPUT_ONLY)
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Creation timestamp (OUTPUT_ONLY)
        model:
          type: string
          description: LLM model name (REQUIRED)
        provider:
          type: string
          description: LLM provider name
        state:
          type: string
          enum: [IDLE, THINKING, TOOL_EXECUTING, COMPACTING, AWAITING_APPROVAL, ERROR]
          readOnly: true
          description: Session state (OUTPUT_ONLY)
        message_count:
          type: integer
          readOnly: true
          description: Number of messages (OUTPUT_ONLY)
        total_tokens:
          type: integer
          readOnly: true
          description: Total token count (OUTPUT_ONLY)
      required:
        - model

    SessionCreate:
      type: object
      properties:
        model:
          type: string
          description: LLM model name
        provider:
          type: string
          description: LLM provider name
      required:
        - model

    SessionUpdate:
      type: object
      properties:
        model:
          type: string
          description: LLM model name

    Message:
      type: object
      properties:
        role:
          type: string
          enum: [system, user, assistant, tool]
          description: Message role (REQUIRED)
        content:
          type: string
          description: Message content (REQUIRED)
        tool_calls:
          type: array
          items:
            $ref: '#/components/schemas/ToolCall'
          readOnly: true
          description: Tool calls (OUTPUT_ONLY)
        tool_call_id:
          type: string
          description: Tool call ID for tool responses
        tokens:
          type: integer
          readOnly: true
          description: Token count (OUTPUT_ONLY)
        timestamp:
          type: string
          format: date-time
          readOnly: true
          description: Message timestamp (OUTPUT_ONLY)
      required:
        - role
        - content

    MessageCreate:
      type: object
      properties:
        content:
          type: string
          description: User message content
      required:
        - content

    ToolCall:
      type: object
      properties:
        id:
          type: string
          description: Tool call ID
        name:
          type: string
          description: Tool name
        arguments:
          type: object
          description: Tool arguments

    Tool:
      type: object
      properties:
        name:
          type: string
          readOnly: true
          description: Tool name (OUTPUT_ONLY)
        description:
          type: string
          readOnly: true
          description: Tool description (OUTPUT_ONLY)
        parameters:
          type: object
          readOnly: true
          description: Tool parameters schema (OUTPUT_ONLY)
        safe:
          type: boolean
          readOnly: true
          description: Whether tool is safe (OUTPUT_ONLY)

    Config:
      type: object
      properties:
        provider:
          type: string
          description: Default LLM provider
        model:
          type: string
          description: Default LLM model
        server_url:
          type: string
          description: Provider server URL
        safety_mode:
          type: string
          enum: [ask, auto, off]
          description: Safety mode
        context_budget:
          type: integer
          description: Context window budget
        timeout:
          type: integer
          description: Request timeout in seconds
        max_iterations:
          type: integer
          description: Maximum tool iterations

    ConfigUpdate:
      type: object
      properties:
        provider:
          type: string
        model:
          type: string
        server_url:
          type: string
        safety_mode:
          type: string
          enum: [ask, auto, off]
        context_budget:
          type: integer
        timeout:
          type: integer
        max_iterations:
          type: integer

    AgentEvent:
      type: object
      properties:
        type:
          type: string
          enum: [text, tool_start, tool_result, error, done]
        text:
          type: string
          description: Text content (for type=text)
        name:
          type: string
          description: Tool name (for type=tool_start, tool_result)
        success:
          type: boolean
          description: Tool success (for type=tool_result)
        content:
          type: string
          description: Tool result content (for type=tool_result)
        error:
          type: string
          description: Error message (for type=error)
        final_text:
          type: string
          description: Final response (for type=done)

    ListSessionsResponse:
      type: object
      properties:
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/Session'
        next_page_token:
          type: string
          description: Opaque cursor for next page

    ListMessagesResponse:
      type: object
      properties:
        messages:
          type: array
          items:
            $ref: '#/components/schemas/Message'
        next_page_token:
          type: string
          description: Opaque cursor for next page

    ListToolsResponse:
      type: object
      properties:
        tools:
          type: array
          items:
            $ref: '#/components/schemas/Tool'

    Subagent:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: Subagent UUID (OUTPUT_ONLY)
        parent_session_id:
          type: string
          format: uuid
          description: Parent session ID
        status:
          type: string
          enum: [RUNNING, COMPLETED, FAILED]
          readOnly: true
          description: Subagent status (OUTPUT_ONLY)
        task:
          type: string
          description: Subagent task description
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Creation timestamp (OUTPUT_ONLY)

    SubagentSpawn:
      type: object
      properties:
        task:
          type: string
          description: Task description for the subagent
        persona:
          type: string
          description: Persona to use for the subagent
      required:
        - task

    SubagentResult:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: Subagent UUID (OUTPUT_ONLY)
        result:
          type: string
          description: Subagent final result
        success:
          type: boolean
          description: Whether the subagent succeeded
        error:
          type: string
          description: Error message if failed
        completed_at:
          type: string
          format: date-time
          description: Completion timestamp

    ListSubagentsResponse:
      type: object
      properties:
        subagents:
          type: array
          items:
            $ref: '#/components/schemas/Subagent'
        next_page_token:
          type: string

    MemoryEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: Memory entry UUID (OUTPUT_ONLY)
        scope:
          type: string
          enum: [global, project, session]
          description: Memory scope
        key:
          type: string
          description: Memory key
        content:
          type: string
          description: Memory content
        metadata:
          type: object
          description: Optional metadata
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Creation timestamp (OUTPUT_ONLY)

    ListMemoryResponse:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/MemoryEntry'
        next_page_token:
          type: string

    SearchMemoryResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/MemoryEntry'

    Snapshot:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: Snapshot UUID (OUTPUT_ONLY)
        session_id:
          type: string
          format: uuid
          description: Session ID
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Creation timestamp (OUTPUT_ONLY)
        message_count:
          type: integer
          description: Number of messages in snapshot

    ListSnapshotsResponse:
      type: object
      properties:
        snapshots:
          type: array
          items:
            $ref: '#/components/schemas/Snapshot'

    Todo:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: Todo UUID (OUTPUT_ONLY)
        content:
          type: string
          description: Todo content
        done:
          type: boolean
          description: Whether the todo is completed
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Creation timestamp (OUTPUT_ONLY)

    TodoCreate:
      type: object
      properties:
        content:
          type: string
          description: Todo content
      required:
        - content

    TodoUpdate:
      type: object
      properties:
        content:
          type: string
          description: Todo content
        done:
          type: boolean
          description: Completion status

    ListTodosResponse:
      type: object
      properties:
        todos:
          type: array
          items:
            $ref: '#/components/schemas/Todo'
        next_page_token:
          type: string

    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: integer
              description: HTTP status code
            message:
              type: string
              description: Human-readable error message
            status:
              type: string
              description: Canonical error status (AIP-193)
            details:
              type: array
              items:
                type: object
              description: Additional error details

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: 400
              message: "Invalid request: missing required field 'model'"
              status: "INVALID_ARGUMENT"
              details: []
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: 404
              message: "Session not found"
              status: "NOT_FOUND"
              details: []
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: 500
              message: "Internal server error"
              status: "INTERNAL"
              details: []
